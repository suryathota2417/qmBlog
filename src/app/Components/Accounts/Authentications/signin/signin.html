





<div class="signin-container">

  <h2 class="signin-title">Sign In</h2>

  <form class="signin-form" [formGroup]="signinForm" (ngSubmit)="onSubmit()">

   
    <div class="form-group">
      <label class="form-label">Email</label>
      <input 
        class="form-input"
        type="email" 
        formControlName="email" 
        placeholder="Enter email" 
      />

      <small class="error-text"
        *ngIf="signinForm.get('email')?.touched && signinForm.get('email')?.invalid">
        Enter valid email
      </small>
    </div>

   
    <div class="form-group">
      <label class="form-label">Password</label>
      <input 
        class="form-input"
        type="password" 
        formControlName="password" 
        placeholder="Enter password" 
      />

      <small class="error-text"
        *ngIf="signinForm.get('password')?.touched && signinForm.get('password')?.invalid">
        Password must be at least 6 characters
      </small>
    </div>

 
    <button class="login-btn" type="submit">
      Login
    </button>

 
    <p class="error-text" *ngIf="errorMsg">
      {{ errorMsg }}
    </p>

  </form>


  <p class="signup-link">
    Don't have an account? 
    <a [routerLink]="['/signup']">Sign Up</a>
  </p>

</div>

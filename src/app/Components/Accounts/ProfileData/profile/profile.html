<div class="profile-container">
  <h2 class="profile-title">My Profile</h2>

  <div class="image-section">
    <img
      [src]="imagePreview || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'"
      alt="profile"
      class="profile-img"
    />

    <input class="file-input" type="file" (change)="onFileChange($event)" />
  </div>

  <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label class="form-label">First Name</label>
      <input class="form-input" type="text" formControlName="firstName" />
    </div>

    <div class="form-group">
      <label class="form-label">Last Name</label>
      <input class="form-input" type="text" formControlName="lastName" />
    </div>

    <div class="form-group">
      <label class="form-label">Mobile Number</label>
      <input class="form-input" type="text" formControlName="mobile" />
    </div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" formControlName="email" />
    </div>

    <button class="update-btn" type="submit" [disabled]="profileForm.invalid">
      Update Profile
    </button>
  </form>
</div>

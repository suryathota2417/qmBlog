<form #postForm="ngForm" (ngSubmit)="addPost()">
  <div class="create-post-container container">
    <h2 class="mb-4 text-center">Create New Post</h2>

    <div class="row g-3">
      <div class="col-md-6">
        <input type="text" name="title" class="form-control"
          placeholder="Title"
          [(ngModel)]="title"
          required />
      </div>

      <div class="col-md-6">
        <input type="text" name="category" class="form-control"
          placeholder="Category"
          [(ngModel)]="category"
          required />
      </div>

      <div class="col-md-6">
        <input type="text" name="author" class="form-control"
          placeholder="Author"
          [(ngModel)]="author"
          required />
      </div>

      <div class="col-md-6">
        <input type="number" name="readTime" class="form-control"
          placeholder="Read Time (min)"
          [(ngModel)]="readTime"
          required />
      </div>

      <div class="col-12">
        <textarea name="summary" class="form-control"
          rows="4"
          placeholder="Summary"
          [(ngModel)]="summary"
          required>
        </textarea>
      </div>

      <div class="col-md-6">
        <input type="file" class="form-control"
          accept="image/*"
          (change)="onImageUpload($event)" />
      </div>

      <div class="col-12 text-center" *ngIf="image">
        <img [src]="image" class="img-fluid rounded" style="max-height: 200px" />
      </div>

      <div class="col-12 text-center">
        <button class="btn btn-primary px-5"
          type="submit"
          [disabled]="postForm.invalid">
          Post
        </button>
      </div>
    </div>
  </div>
</form>
